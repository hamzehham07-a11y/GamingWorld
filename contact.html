<div class="container card">
    <h1>Contact Us</h1>
    <p>Have any questions or suggestions? Get in touch with the Gaming World team!</p>
<form class="contact-form">
<div class="form-group">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
</div>
<div class="form-group">
    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
</div>
<div class="form-group">
    <label for="subject">Subject:</label>
    <select id="subject" name="subject">
    <option value="general">General Inquiry</option>
    <option value="feedback">Game Feedback</option>
    <option value="support">Technical Support</option>
    </select>
</div>
<div class="form-group-radio">
    <label>Preferred Gaming Platform:</label>
<div class="radio-options">
    <label><input type="radio" name="platform" value="pc"> PC</label>
    <label><input type="radio" name="platform" value="console"> Console</label>
    <label><input type="radio" name="platform" value="mobile"> Mobile</label>
</div>
</div>
<div class="form-group">
    <label for="message">Your Message:</label>
    <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
</div>
<button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>
</body>
</html>
