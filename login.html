<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Gaming World</title>

    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/navbar.css?v=20">
    <link rel="stylesheet" href="css/cards.css?v=2">

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>
        .login-box {
            width: min(420px, 92%);
        }

        .login-subtitle {
            color: #aeb6c6;
            margin-bottom: 20px;
        }

        .google-login-btn {
            width: 100%;
            padding: 13px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 10px;
            background: #ffffff;
            color: #111827;
            font-weight: 600;
            cursor: pointer;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #9098a8;
            margin: 16px 0;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.14);
        }

        .message {
            display: none;
            margin: 14px 0;
            padding: 11px;
            border-radius: 8px;
            font-size: 14px;
        }

        .message.show {
            display: block;
        }

        .message.error {
            color: #ffb4b4;
            background: rgba(255, 60, 60, 0.12);
        }

        .message.success {
            color: #b8ffd0;
            background: rgba(40, 200, 100, 0.12);
        }

        .switch-auth-btn {
            padding: 0;
            border: 0;
            background: transparent;
            color: #ff7a00;
            cursor: pointer;
            font: inherit;
        }

        .hidden {
            display: none !important;
        }

        #userPanel {
            display: none;
            text-align: center;
        }

        #userPanel.show {
            display: block;
        }

        #userPhoto {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
        }

        #logoutBtn {
            width: 100%;
            padding: 13px;
            margin-top: 18px;
            border: 0;
            border-radius: 10px;
            background: #ff6b00;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="login-page">

    <div class="login-box">

        <h1>Gaming<span>World</span></h1>

        <div id="authPanel">

            <h2 id="formTitle">Welcome Back</h2>

            <p id="formSubtitle" class="login-subtitle">
                Sign in to continue to your account
            </p>

            <button id="googleBtn" class="google-login-btn" type="button">
                Continue with Google
            </button>

            <div class="divider">OR</div>

            <div id="message" class="message"></div>

            <form id="authForm">

                <input
                    id="email"
                    type="email"
                    placeholder="Email Address"
                    autocomplete="email"
                    required
                >

                <input
                    id="password"
                    type="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    minlength="6"
                    required
                >

                <button id="submitBtn" type="submit">
                    Login
                </button>

            </form>

            <p>
                <span id="switchQuestion">Don't have an account?</span>

                <button id="switchModeBtn" class="switch-auth-btn" type="button">
                    Register
                </button>
            </p>

        </div>

        <div id="userPanel">

            <img id="userPhoto" src="favicon.png" alt="User">

            <h2 id="userName">Gaming World User</h2>

            <p id="userEmail"></p>

            <button id="logoutBtn" type="button">
                Logout
            </button>

        </div>

        <a href="index.html" class="back-home">
            ← Back Home
        </a>

    </div>

</div>

<script src="app.js?v=5"></script>

</body>
</html>
